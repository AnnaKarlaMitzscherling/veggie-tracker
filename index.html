<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Veggie Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --accent: #4CAF50;
    --accent-hover: #43a047;
    --accent-soft: #e8f5e9;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    padding: 24px 20px 60px;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    padding-top: 24px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Counter */
  .counter-wrap {
    text-align: center;
    margin-bottom: 32px;
  }

  .counter {
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
    letter-spacing: -3px;
  }

  .counter .current {
    color: var(--accent);
  }

  .counter .divider,
  .counter .total {
    color: var(--text-muted);
    font-weight: 700;
  }

  .counter-label {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.35s ease;
    border-radius: 999px;
  }

  /* Add Button */
  .add-section {
    margin-bottom: 40px;
  }

  .btn-add {
    width: 100%;
    padding: 16px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-add:hover {
    background: var(--accent-hover);
  }

  .btn-add:active {
    background: var(--accent-hover);
  }

  /* Input form */
  .input-form {
    display: none;
    gap: 8px;
    width: 100%;
  }

  .input-form.active {
    display: flex;
  }

  .input-form input {
    flex: 1;
    padding: 16px 18px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s ease;
    min-width: 0;
  }

  .input-form input:focus {
    border-color: var(--accent);
  }

  .btn-submit, .btn-cancel {
    padding: 0 18px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .btn-submit {
    background: var(--accent);
    color: white;
  }

  .btn-submit:hover { background: var(--accent-hover); }

  .btn-cancel {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    padding: 0 14px;
  }

  .btn-cancel:hover {
    background: var(--bg);
    color: var(--text);
  }

  /* Error message */
  .feedback {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-muted);
    min-height: 20px;
    text-align: center;
  }

  .feedback.error { color: #d97706; }

  /* Items list */
  .items-section h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .items-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    list-style: none;
  }

  .item-pill {
    display: inline-flex;
    align-items: center;
    padding: 8px 14px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    animation: pop-in 0.25s ease;
  }

  @keyframes pop-in {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .empty-state {
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
  }

  /* Success Screen */
  .success-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: fade-in 0.5s ease;
  }

  .success-screen.active {
    display: block;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 24px auto 32px;
  }

  .check-icon svg {
    width: 40px;
    height: 40px;
    stroke: var(--accent);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: draw-check 0.6s ease 0.2s both;
  }

  @keyframes draw-check {
    from { stroke-dasharray: 50; stroke-dashoffset: 50; }
    to { stroke-dasharray: 50; stroke-dashoffset: 0; }
  }

  .success-message {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 16px;
    color: var(--text);
  }

  .success-subtitle {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .success-list-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* Hide main when success */
  .main-view.hidden { display: none; }

  /* Tab bar */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--border);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 32px;
  }

  .tab {
    flex: 1;
    padding: 10px 16px;
    background: transparent;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
  }

  /* History view */
  .history-view { display: none; }
  .history-view.active { display: block; }

  .history-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
    padding: 40px 20px;
  }

  .history-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .history-entry.current {
    border-color: var(--accent);
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .history-week {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .history-week-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .history-week-tag {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .history-status {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .history-count {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .history-count.done {
    color: var(--accent);
    font-size: 18px;
  }

  .chevron {
    width: 16px;
    height: 16px;
    color: var(--text-muted);
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }

  .history-entry.open .chevron {
    transform: rotate(180deg);
  }

  .history-body {
    display: none;
    padding: 4px 16px 16px;
    border-top: 1px solid var(--border);
  }

  .history-entry.open .history-body {
    display: block;
  }

  .history-body .items-list {
    padding-top: 14px;
  }

  .history-body-empty {
    padding-top: 14px;
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Mobile tweaks */
  @media (max-width: 420px) {
    .counter { font-size: 80px; letter-spacing: -2px; }
    h1 { font-size: 16px; }
    .success-message { font-size: 19px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Veggie Tracker</h1>
    </header>

    <!-- Tab bar -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="tracker">Tracker</button>
      <button class="tab" data-view="history">Meine Wochen</button>
    </nav>

    <!-- Main View -->
    <main class="main-view" id="mainView">
      <div class="counter-wrap">
        <div class="counter">
          <span class="current" id="counterCurrent">0</span><span class="divider"> / </span><span class="total">30</span>
        </div>
        <div class="counter-label">verschiedene Gemüse &amp; Früchte diese Woche</div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="add-section">
        <button class="btn-add" id="btnAdd">Heute eintragen</button>
        <form class="input-form" id="inputForm" autocomplete="off">
          <input
            type="text"
            id="inputItem"
            placeholder="z.B. Karotte, Apfel, Spinat …"
            maxlength="40"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          />
          <button type="submit" class="btn-submit">OK</button>
          <button type="button" class="btn-cancel" id="btnCancel">✕</button>
        </form>
        <div class="feedback" id="feedback"></div>
      </div>

      <section class="items-section">
        <h2>Diese Woche gegessen</h2>
        <ul class="items-list" id="itemsList"></ul>
      </section>
    </main>

    <!-- Success View -->
    <section class="success-screen" id="successScreen">
      <div class="check-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="4,12 10,18 20,7"></polyline>
        </svg>
      </div>
      <div class="success-message">Geschafft! 🎉</div>
      <div class="success-subtitle">
        Du hast diese Woche 30 verschiedene Gemüse &amp; Früchte gegessen.
      </div>
      <h3 class="success-list-title">Deine 30 Items</h3>
      <ul class="items-list" id="successList" style="justify-content: center;"></ul>
    </section>

    <!-- History View -->
    <section class="history-view" id="historyView">
      <ul class="history-list" id="historyList"></ul>
    </section>
  </div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'veggie-tracker-v1';
  const HISTORY_KEY = 'veggie_history';
  const GOAL = 30;

  // --- ISO Week calculation ---
  function getISOWeekKey(date) {
    date = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    // Thursday in current week decides the year
    const dayNum = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    const weekNum = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    return `${date.getUTCFullYear()}-W${String(weekNum).padStart(2, '0')}`;
  }

  // --- Storage ---
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      return null;
    }
  }

  function saveState(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* ignore quota errors */ }
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return (parsed && typeof parsed === 'object') ? parsed : {};
    } catch (e) {
      return {};
    }
  }

  function saveHistory(history) {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    } catch (e) { /* ignore */ }
  }

  // Archive a completed week into history, but only if it has items.
  function archiveWeek(weekKey, items) {
    if (!weekKey || !Array.isArray(items) || items.length === 0) return;
    const history = loadHistory();
    // Don't overwrite an existing archive entry for the same week
    if (!history[weekKey]) {
      history[weekKey] = { items: items.slice(), archivedAt: Date.now() };
      saveHistory(history);
    }
  }

  // --- State ---
  let state = {
    week: getISOWeekKey(new Date()),
    items: [] // preserves original casing for display
  };

  const stored = loadState();
  if (stored && stored.week === state.week && Array.isArray(stored.items)) {
    state.items = stored.items;
  } else {
    // Week has rolled over (or first run) — archive previous week if it had data
    if (stored && stored.week && Array.isArray(stored.items)) {
      archiveWeek(stored.week, stored.items);
    }
    saveState(state);
  }

  // --- DOM ---
  const mainView      = document.getElementById('mainView');
  const successScreen = document.getElementById('successScreen');
  const counterEl     = document.getElementById('counterCurrent');
  const progressFill  = document.getElementById('progressFill');
  const btnAdd        = document.getElementById('btnAdd');
  const inputForm     = document.getElementById('inputForm');
  const inputItem     = document.getElementById('inputItem');
  const btnCancel     = document.getElementById('btnCancel');
  const feedback      = document.getElementById('feedback');
  const itemsList     = document.getElementById('itemsList');
  const successList   = document.getElementById('successList');
  const tabsEl        = document.getElementById('tabs');
  const tabButtons    = tabsEl.querySelectorAll('.tab');
  const historyView   = document.getElementById('historyView');
  const historyListEl = document.getElementById('historyList');

  let currentTab = 'tracker';

  // --- Rendering ---
  function render() {
    const count = state.items.length;
    counterEl.textContent = count;
    progressFill.style.width = Math.min(100, (count / GOAL) * 100) + '%';

    if (currentTab === 'tracker') {
      historyView.classList.remove('active');
      if (count >= GOAL) {
        showSuccess();
      } else {
        mainView.classList.remove('hidden');
        successScreen.classList.remove('active');
      }
    } else {
      // History tab: hide both tracker subviews
      mainView.classList.add('hidden');
      successScreen.classList.remove('active');
      historyView.classList.add('active');
      renderHistory();
    }

    renderList(itemsList, state.items, true);
  }

  function renderList(targetEl, items, emptyMessage) {
    targetEl.innerHTML = '';
    if (items.length === 0 && emptyMessage) {
      const li = document.createElement('li');
      li.className = 'empty-state';
      li.textContent = 'Noch nichts eingetragen.';
      targetEl.appendChild(li);
      return;
    }
    items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item-pill';
      li.textContent = item;
      targetEl.appendChild(li);
    });
  }

  function showSuccess() {
    mainView.classList.add('hidden');
    successScreen.classList.add('active');
    renderList(successList, state.items, false);
  }

  // --- Tab switching ---
  function switchTab(name) {
    if (name === currentTab) return;
    currentTab = name;
    tabButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === name);
    });
    // If user leaves tracker mid-entry, tidy up the input
    if (name !== 'tracker') closeInput();
    render();
  }

  // --- History rendering ---
  // Parse "YYYY-Www" → { year: number, week: number }
  function parseWeekKey(key) {
    const m = /^(\d{4})-W(\d{2})$/.exec(key);
    if (!m) return null;
    return { year: parseInt(m[1], 10), week: parseInt(m[2], 10) };
  }

  function formatWeekLabel(key) {
    const parsed = parseWeekKey(key);
    if (!parsed) return key;
    return `KW ${parsed.week} · ${parsed.year}`;
  }

  function renderHistory() {
    const history = loadHistory();
    historyListEl.innerHTML = '';

    // Build entries: current week (always shown) + all archived weeks
    const entries = [];
    entries.push({
      key: state.week,
      items: state.items,
      isCurrent: true
    });

    Object.keys(history)
      .filter(k => k !== state.week) // safety: don't duplicate current week
      .forEach(k => {
        entries.push({
          key: k,
          items: Array.isArray(history[k].items) ? history[k].items : [],
          isCurrent: false
        });
      });

    // Sort: current first, then archived by week key descending (newest first)
    entries.sort((a, b) => {
      if (a.isCurrent) return -1;
      if (b.isCurrent) return 1;
      return b.key.localeCompare(a.key);
    });

    if (entries.length === 1 && state.items.length === 0) {
      // Only current week, with no items yet
      const li = document.createElement('li');
      li.className = 'history-empty';
      li.textContent = 'Noch keine Daten. Trag deine erste Frucht oder dein erstes Gemüse ein!';
      historyListEl.appendChild(li);
      return;
    }

    entries.forEach(entry => {
      historyListEl.appendChild(buildHistoryEntry(entry));
    });
  }

  function buildHistoryEntry(entry) {
    const count = entry.items.length;
    const reached = count >= GOAL;

    const li = document.createElement('li');
    li.className = 'history-entry';
    if (entry.isCurrent) li.classList.add('current');

    // Header (clickable)
    const header = document.createElement('div');
    header.className = 'history-header';

    const weekBox = document.createElement('div');
    weekBox.className = 'history-week';

    const label = document.createElement('span');
    label.className = 'history-week-label';
    label.textContent = formatWeekLabel(entry.key);
    weekBox.appendChild(label);

    if (entry.isCurrent) {
      const tag = document.createElement('span');
      tag.className = 'history-week-tag';
      tag.textContent = 'laufende Woche';
      weekBox.appendChild(tag);
    }

    const status = document.createElement('div');
    status.className = 'history-status';

    const countEl = document.createElement('span');
    if (reached) {
      countEl.className = 'history-count done';
      countEl.textContent = '✅';
      countEl.setAttribute('aria-label', 'Ziel erreicht');
    } else {
      countEl.className = 'history-count';
      countEl.textContent = `${count} / ${GOAL}`;
    }
    status.appendChild(countEl);

    const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    chevron.setAttribute('class', 'chevron');
    chevron.setAttribute('viewBox', '0 0 24 24');
    chevron.setAttribute('fill', 'none');
    chevron.setAttribute('stroke', 'currentColor');
    chevron.setAttribute('stroke-width', '2.5');
    chevron.setAttribute('stroke-linecap', 'round');
    chevron.setAttribute('stroke-linejoin', 'round');
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    path.setAttribute('points', '6,9 12,15 18,9');
    chevron.appendChild(path);
    status.appendChild(chevron);

    header.appendChild(weekBox);
    header.appendChild(status);

    // Body (collapsible)
    const body = document.createElement('div');
    body.className = 'history-body';

    if (count === 0) {
      const empty = document.createElement('div');
      empty.className = 'history-body-empty';
      empty.textContent = 'Keine Einträge in dieser Woche.';
      body.appendChild(empty);
    } else {
      const ul = document.createElement('ul');
      ul.className = 'items-list';
      entry.items.forEach(item => {
        const pill = document.createElement('li');
        pill.className = 'item-pill';
        pill.textContent = item;
        ul.appendChild(pill);
      });
      body.appendChild(ul);
    }

    header.addEventListener('click', () => {
      li.classList.toggle('open');
    });

    li.appendChild(header);
    li.appendChild(body);
    return li;
  }

  // --- Add logic ---
  function openInput() {
    btnAdd.style.display = 'none';
    inputForm.classList.add('active');
    feedback.textContent = '';
    feedback.classList.remove('error');
    // small delay so iOS scrolls properly
    setTimeout(() => inputItem.focus(), 50);
  }

  function closeInput() {
    inputForm.classList.remove('active');
    btnAdd.style.display = '';
    inputItem.value = '';
    feedback.textContent = '';
    feedback.classList.remove('error');
  }

  function showError(msg) {
    feedback.textContent = msg;
    feedback.classList.add('error');
  }

  function showInfo(msg) {
    feedback.textContent = msg;
    feedback.classList.remove('error');
    setTimeout(() => {
      if (feedback.textContent === msg) feedback.textContent = '';
    }, 2200);
  }

  function addItem(rawValue) {
    const value = rawValue.trim();
    if (!value) return;

    const normalized = value.toLowerCase();
    const exists = state.items.some(i => i.toLowerCase() === normalized);

    if (exists) {
      showError(`"${value}" hast du diese Woche schon eingetragen.`);
      inputItem.select();
      return;
    }

    // capitalize first letter for clean display
    const display = value.charAt(0).toUpperCase() + value.slice(1);
    state.items.push(display);
    saveState(state);
    inputItem.value = '';
    showInfo(`✓ ${display} hinzugefügt`);
    render();

    if (state.items.length < GOAL) {
      inputItem.focus();
    }
  }

  // --- Event listeners ---
  btnAdd.addEventListener('click', openInput);
  btnCancel.addEventListener('click', closeInput);

  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.view));
  });

  inputForm.addEventListener('submit', (e) => {
    e.preventDefault();
    addItem(inputItem.value);
  });

  inputItem.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeInput();
    }
  });

  // Check week rollover when tab becomes visible (e.g. user comes back next week)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const currentWeek = getISOWeekKey(new Date());
      if (currentWeek !== state.week) {
        archiveWeek(state.week, state.items);
        state = { week: currentWeek, items: [] };
        saveState(state);
        render();
      }
    }
  });

  // Initial render
  render();
})();
</script>
</body>
</html>
